<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProCalc</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f1e, #1a1a2e);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto Mono', monospace;
            overflow: hidden;
        }

        .calculator {
            background: #0a0a14;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 
                0 0 60px rgba(0, 243, 255, 0.3),
                inset 0 0 40px rgba(255,255,255,0.05),
                0 20px 40px rgba(0,0,0,0.8);
            border: 2px solid #00f3ff;
            width: 380px;
        }

        #inp {
            width: 100%;
            height: 110px;
            background: #111827;
            border: none;
            border-radius: 20px;
            color: #00ffcc;
            font-size: 2.8rem;
            text-align: right;
            padding: 0 25px;
            margin-bottom: 20px;
            box-shadow: inset 0 8px 15px rgba(0,0,0,0.7);
            letter-spacing: 5px;
            font-weight: 500;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .number {
            background: #1e2937;
            color: #e0f2fe;
            height: 75px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }

        .number:active {
            transform: scale(0.92) translateY(8px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .operator {
            background: linear-gradient(145deg, #f59e0b, #d97706);
            color: white;
            font-weight: 700;
            box-shadow: 0 8px 15px rgba(245, 158, 11, 0.4);
            font-size: 25px;
        }

        .operator:active {
            background: linear-gradient(145deg, #d97706, #b45309);
        }

        .equals {
            background: linear-gradient(145deg, #22c55e, #16a34a);
            color: white;
            font-size: 2rem;
            font-weight: 700;
            grid-column: 1 / span 4;
            box-shadow: 0 8px 15px rgba(34, 197, 94, 0.4);
            cursor: pointer;
        }

        .clear {
            background: linear-gradient(145deg, #ef4444, #dc2626);
            color: white;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 30px;
            box-shadow: 0 8px 15px rgba(239, 68, 68, 0.4);
            grid-column: 2 / span 2;
            border-radius: 5px;
        }

        .number:hover, .operator:hover, .equals:hover, .clear:hover {
            filter: brightness(1.20);
        }

        #h2 {
            text-align: center;
            margin-top: 20px;
            color: #67e8f9;
            font-size: 1.4rem;
            text-shadow: 0 0 15px rgba(103, 232, 249, 0.6);
            min-height: 30px;
        }

        .display-container {
            position: relative;
        }

        .display-container::after {
            content: '';
            position: absolute;
            top: 15px;
            right: 25px;
            width: 12px;
            height: 12px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 12px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display-container">
            <input type="text" placeholder="0" id="inp" disabled>
        </div>

        <div class="keypad">
            <div class="number" onclick="addnumber(7)">7</div>
            <div class="number" onclick="addnumber(8)">8</div>
            <div class="number" onclick="addnumber(9)">9</div>
            <button class="operator" onclick="amal('/')">÷</button>

            <div class="number" onclick="addnumber(4)">4</div>
            <div class="number" onclick="addnumber(5)">5</div>
            <div class="number" onclick="addnumber(6)">6</div>
            <button class="operator" onclick="amal('*')">×</button>

            <div class="number" onclick="addnumber(1)">1</div>
            <div class="number" onclick="addnumber(2)">2</div>
            <div class="number" onclick="addnumber(3)">3</div>
            <button class="operator" onclick="amal('-')">−</button>

            <div class="number" onclick="addnumber(0)">0</div>
            <div class="clear" onclick="reset()">C</div>
            <button class="operator" onclick="amal('+')">+</button>
            <button class="equals" onclick="sum()">=</button>
        </div>

        <h2 id="h2"></h2>
    </div>

<script>
    // JavaScript code (exactly as you had, untouched)
    const inp = document.getElementById("inp")
    const h2 = document.getElementById("h2")

    let number1 = 0
    let number2 = 0
    let opa = ""


    function addnumber(num) {

        inp.value += num

        if (opa === "") {
            number1 = +inp.value
        } else {
            number2 = +inp.value
        }


    }

    function amal(res) {

        opa = res

        inp.value = ""

    }

    function sum() {

        if (opa == "+") {
            h2.innerHTML = number1 + number2

        } else if (opa == "-") {

            h2.innerHTML = number1 - number2
        } else if (opa == "*") {
            h2.innerHTML = number1 * number2

        } else {
            h2.innerHTML = number1 / number2

        }
        inp.value = ""



    }

    function reset() {
        inp.value = ""
        number1 = 0
        number2 = 0
        opa = ""
        h2.innerHTML = ""
    }
</script>

</body>
</html>
