    const h2 = document.getElementById("h2")
    const inp = document.querySelectorAll("input")

    function op(amal) {
        console.log(amal);
        window.amal = amal

    }

    function sum() {


        let flag = 0
        // reset

        inp[0].style.border = '2px solid black'
        inp[1].style.border = '2px solid black'

        // reset

        let x = +inp[0].value
        let y = +inp[1].value

        if (x == "") {
            inp[0].style.border = "4px solid red"
            flag++
            return
        }
        if (y == "") {
            inp[1].style.border = "4px solid red"

            flag++
            return
        }


        if (flag == 0) {

            if (amal == "+") {
                h2.innerHTML = x + y
            } else if (amal == "-") {
                h2.innerHTML = x - y
            } else if (amal == "*") {
                h2.innerHTML = x * y
            } else if (amal == "/") {
                if (x == 0 || y == 0) {
                    alert("0 clear")
                } else {

                    h2.innerHTML = x / y
                }
            }

        } else {
            alert("pleas again")
